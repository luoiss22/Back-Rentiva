name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd /var/www/rentiva/backend

            echo "--- Pulling latest code ---"
            git pull origin main

            echo "--- Installing dependencies ---"
            /var/www/rentiva/backend/.venv/bin/pip install -r requirements.txt --quiet

            echo "--- Running migrations ---"
            /var/www/rentiva/backend/.venv/bin/python manage.py migrate --noinput       

            echo "--- Collecting static files ---"
            /var/www/rentiva/backend/.venv/bin/python manage.py collectstatic --noinput 

            echo "--- Restarting Gunicorn ---"
            systemctl restart rentiva-backend
